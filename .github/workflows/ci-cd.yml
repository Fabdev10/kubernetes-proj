name: Build, Test and Publish

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Verify API lockfile is present
        run: |
          pwd
          ls -la apps/api

      - name: Install API dependencies
        run: npm ci --prefix apps/api --no-audit --no-fund

      - name: Run API tests
        run: npm --prefix apps/api test

  build-and-publish:
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Verify Docker build context
        run: |
          pwd
          ls -la
          ls -la apps/api
          ls -la apps/frontend
          if [ ! -f apps/api/Dockerfile ]; then
            echo "ERROR: apps/api/Dockerfile not found"
            exit 1
          fi
          if [ ! -f apps/frontend/Dockerfile ]; then
            echo "ERROR: apps/frontend/Dockerfile not found"
            exit 1
          fi

      - name: Build and push API image
        run: |
          docker build -f apps/api/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ github.ref_name }} ./apps/api
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-api:${{ github.ref_name }}

      - name: Build and push Frontend image
        run: |
          docker build -f apps/frontend/Dockerfile -t ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend:${{ github.ref_name }} ./apps/frontend
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-frontend:${{ github.ref_name }}
