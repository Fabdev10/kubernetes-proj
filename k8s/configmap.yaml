# Shared non-sensitive configuration for the application services.
apiVersion: v1
kind: ConfigMap
metadata:
  name: taskflow-config
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow
    app.kubernetes.io/component: config
data:
  DB_HOST: "taskflow-postgres"
  DB_PORT: "5432"
  DB_NAME: "taskflow"
  DB_USER: "taskflow"
  API_PORT: "3000"
  FRONTEND_PORT: "80"
  API_BASE_URL: "/api"
