# Service exposing the API internally and through the ingress.
apiVersion: v1
kind: Service
metadata:
  name: taskflow-api
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow
    app.kubernetes.io/component: api
spec:
  selector:
    app.kubernetes.io/name: taskflow
    app.kubernetes.io/component: api
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
