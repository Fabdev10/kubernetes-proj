# Sensitive values used by the application and PostgreSQL.
apiVersion: v1
kind: Secret
metadata:
  name: taskflow-secret
  namespace: taskflow
  labels:
    app.kubernetes.io/name: taskflow
    app.kubernetes.io/component: config
type: Opaque
stringData:
  DB_PASSWORD: "taskflowpass"
  POSTGRES_PASSWORD: "taskflowpass"
