services:
  db:
    image: postgres:16-alpine
    container_name: taskflow-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflowpass}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: taskflow-api
    environment:
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-taskflow}
      DB_USER: ${DB_USER:-taskflow}
      DB_PASSWORD: ${DB_PASSWORD:-taskflowpass}
      PORT: ${PORT:-3000}
    depends_on:
      - db
    ports:
      - "${API_PORT:-3000}:3000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: taskflow-frontend
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://localhost:3000}
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-8080}:80"

volumes:
  postgres_data:
