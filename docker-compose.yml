version: '3.9'
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: taskflow
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflowpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ./apps/api
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: taskflow
      DB_USER: taskflow
      DB_PASSWORD: taskflowpass
      PORT: 3000
    depends_on:
      - db
    ports:
      - "3000:3000"

  frontend:
    build:
      context: ./apps/frontend
    environment:
      API_BASE_URL: http://localhost:3000
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:
